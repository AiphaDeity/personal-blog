{% extends 'base.html' %}

{% block title %}{{ post.title }} - 我的博客{% endblock %}

{% block content %}
<article>
    <h2>{{ post.title }}</h2>
    <small>发布于：{{ post.created_at.strftime('%Y-%m-%d %H:%M') }}</small>
    <hr>
    <p>{{ post.content }}</p>
</article>

<p><a href="/">← 返回首页</a></p>
{% endblock %}
